name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build the Linux bundles (AppImage + .deb) for the tag and attach them
  # to the GitHub Release.
  binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev
      - name: Build release
        run: cargo build --release --verbose
      - name: Test
        run: cargo test --release
      - name: Install cargo-packager
        run: cargo install cargo-packager --locked
      - name: Package
        run: cargo packager --release
        # linuxdeploy's bundled strip chokes on libraries that use newer
        # ELF relocations (.relr.dyn); skip stripping the bundled libs.
        env:
          NO_STRIP: "true"
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/*.AppImage
            target/release/*.deb
          generate_release_notes: true

  # Build the Windows installer (NSIS setup.exe) and attach it to the same
  # GitHub Release for the tag.
  binaries-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --verbose
      - name: Test
        run: cargo test --release
      - name: Install cargo-packager
        run: cargo install cargo-packager --locked
      - name: Package
        run: cargo packager --release
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/*-setup.exe
          generate_release_notes: true

  # Publish to crates.io using Trusted Publishing (OIDC, no stored token).
  # One-time setup required on crates.io: add a Trusted Publisher for this
  # crate pointing at repo bjorn/spacefinder, workflow release.yml. Until
  # that is configured (and for the very first publish, which reserves the
  # name), publish manually with `cargo publish`.
  crate:
    runs-on: ubuntu-latest
    # Gate crate publishing behind the "release" environment. Configure it
    # under Settings > Environments with required reviewers so each publish
    # needs manual approval, and reference the same environment name in the
    # crates.io Trusted Publisher config.
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev
      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
